{% extends "base.html" %}

{% block content %}

<div class="page-wrapper">

<h1>Recommended Jobs</h1>

<div class="jobs-grid">

{% for job in jobs %}

<div class="card card-accent">

<h3>{{ job.title }}</h3>

<p>{{ job.company_name }}</p>

<div class="tag-row">
<span class="skill-tag">Python</span>
<span class="skill-tag">Django</span>
</div>

<a href="{% url 'job_detail' job.id %}" class="btn btn-primary btn-sm" style="margin-top:.7rem;">
Apply
</a>

</div>

{% endfor %}

</div>

</div>

{% endblock %}
