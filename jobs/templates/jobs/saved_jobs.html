<h2>Saved Jobs</h2>

{% for item in saved_jobs %}
    <div style="border:1px solid #ddd; padding:10px; margin-bottom:10px;">
        <h3>{{ item.job.title }}</h3>
        <p>{{ item.job.location }}</p>

        <a href="{% url 'job_detail' item.job.pk %}">
            View Job
        </a>

        <a href="{% url 'save_job' item.job.pk %}" style="color:red;">
            Unsave
        </a>
    </div>
{% empty %}
    <p>No saved jobs yet.</p>
{% endfor %}
